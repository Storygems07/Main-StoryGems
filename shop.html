<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryGems | Shop</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

/* HEADER */
.header{
padding:20px 30px;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.header h2{
color:#4b3ac7;
}

/* SEARCH */
.search{
padding:10px;
width:260px;
border-radius:10px;
border:1px solid #ddd;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:25px;
padding:30px;
}

/* CARD */
.card{
background:white;
border-radius:18px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
transition:0.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

/* IMAGE */
.img{
height:180px;
border-radius:12px;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

/* TEXT */
.title{font-weight:600;margin-top:10px;}
.author{font-size:13px;color:#777;}
.rating{color:#f5a623;font-size:14px;margin:5px 0;}
.price{font-weight:bold;margin:5px 0;}

/* BUTTON */
button{
margin-top:auto;
padding:10px;
border:none;
background:#6c4ab6;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#5a38a8;
}

/* BOTTOM BACK */
.bottom-back{
display:block;
margin:40px auto 60px;
padding:14px 30px;
background:#6366f1;
color:white;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:0.3s;
}

.bottom-back:hover{
background:#4f46e5;
transform:translateY(-2px);
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<!-- HEADER -->
<div class="header">
<h2>📚 Explore Books</h2>
<input type="text" id="search" class="search" placeholder="Search books...">
</div>

<!-- BOOKS -->
<div class="grid" id="booksContainer"></div>

<!-- BACK BUTTON -->
<button class="bottom-back" onclick="goBackToCategory()">
← Back to Categories
</button>

<script type="module" src="js/shop.js"></script>

<script>
function goBackToCategory(){
    window.location.href = "category.html";
}
</script>

</body>
</html>
