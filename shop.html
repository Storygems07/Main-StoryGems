<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryGems | Shop</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

.header{
padding:20px 30px;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.header h2{
color:#4b3ac7;
}

.search{
padding:10px;
width:260px;
border-radius:10px;
border:1px solid #ddd;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:25px;
padding:30px;
}

.card{
background:white;
border-radius:18px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
display:flex;
flex-direction:column;
}

.img{
height:180px;
background:#eee;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

.title{font-weight:600;}
.author{font-size:13px;color:#777;}
.rating{color:#f5a623;}
.price{font-weight:bold;}

button{
margin-top:auto;
padding:10px;
background:#6c4ab6;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.bottom-back{
display:block;
margin:40px auto;
padding:14px 30px;
background:#6366f1;
color:white;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<div class="header">
<h2>📚 Explore Books</h2>
<input type="text" id="search" class="search" placeholder="Search books...">
</div>

<div class="grid" id="booksContainer"></div>

<button class="bottom-back" onclick="goBack()">← Back to Categories</button>

<script type="module" src="js/shop.js"></script>

<script>
function goBack(){
window.location.href="category.html";
}
</script>

</body>
</html>
