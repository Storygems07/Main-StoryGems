<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryGems | Shop</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

/* HEADER */
.header{
padding:20px 30px;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.search{
padding:10px;
width:260px;
border-radius:10px;
border:1px solid #ddd;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:25px;
padding:30px;
}

/* CARD */
.card{
background:white;
border-radius:18px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
transition:0.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-10px);
}

/* IMAGE */
.img img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

/* BUTTON */
button{
margin-top:auto;
padding:10px;
border:none;
background:#6366f1;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

/* BACK BUTTON */
.bottom-back{
display:block;
margin:40px auto;
padding:14px 30px;
background:#6366f1;
color:white;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<div class="header">
<h2>📚 Explore Books</h2>
<input type="text" id="search" class="search" placeholder="Search books...">
</div>

<div class="grid" id="booksContainer"></div>

<button class="bottom-back" onclick="window.location.href='books.html'">
← Back to Categories
</button>

<script type="module" src="js/shop.js"></script>

</body>
</html>
