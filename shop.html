<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StoryGems | Books</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f8f9ff;
}

.container{
padding:40px;
text-align:center;
}

h1{
color:#4b3ac7;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:30px;
}

.card{
background:white;
padding:20px;
width:230px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.price{
color:#6c4ab6;
font-weight:bold;
margin:10px 0;
}

button{
padding:10px;
width:100%;
border:none;
background:#6c4ab6;
color:white;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<div class="container">
<h1 id="title">Books</h1>
<div id="booksContainer" class="grid"></div>
</div>

<script type="module" src="js/shop.js"></script>

</body>
</html>
