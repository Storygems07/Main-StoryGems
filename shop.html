<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryGems | Shop</title>

  <link rel="stylesheet" href="css/style.css">
  
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f5f6fa;
}

/* HEADER */
.header{
padding:20px;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.header h2{
color:#4b3ac7;
}

/* SEARCH */
.search{
padding:10px;
width:250px;
border-radius:8px;
border:1px solid #ddd;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:30px;
}

/* CARD */
.card{
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
transition:0.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-8px);
}

/* IMAGE */
.img{
height:180px;
border-radius:10px;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

/* TITLE */
.title{
font-weight:600;
margin-top:10px;
}

/* AUTHOR */
.author{
font-size:13px;
color:#777;
}

/* RATING */
.rating{
color:#f5a623;
font-size:14px;
margin:5px 0;
}

/* PRICE */
.price{
font-weight:bold;
margin:5px 0;
}

/* BUTTON */
button{
margin-top:auto;
padding:10px;
border:none;
background:#6c4ab6;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<!-- HEADER -->
<div class="header">
<h2>📚 Explore Books</h2>
<input type="text" id="search" class="search" placeholder="Search books...">
</div>

<!-- BOOKS -->
<div class="grid" id="booksContainer"></div>

<script type="module" src="js/shop.js"></script>

</body>
</html>
