<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - StoryGems</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f5f7ff;
}

/* HEADER */
.header{
text-align:center;
padding:30px;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.header h1{
color:#4b3ac7;
}

/* LAYOUT */
.container{
display:flex;
flex-wrap:wrap;
gap:30px;
padding:30px;
}

/* LEFT - ITEMS */
.left{
flex:2;
}

.item{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

/* RIGHT - BILL */
.right{
flex:1;
}

.bill{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.bill h3{
margin-bottom:15px;
}

.row{
display:flex;
justify-content:space-between;
margin:10px 0;
color:#555;
}

.total{
font-weight:bold;
font-size:18px;
border-top:1px solid #eee;
padding-top:10px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
background:#6c4ab6;
color:white;
border-radius:10px;
cursor:pointer;
margin-top:15px;
}

</style>
</head>

<body>

<div class="header">
<h1>Checkout 🧾</h1>
</div>

<div class="container">

<!-- ITEMS -->
<div class="left" id="items"></div>

<!-- BILL -->
<div class="right">
<div class="bill">

<h3>Bill Details</h3>

<div class="row"><span>Items Total</span><span id="itemsTotal">₹0</span></div>
<div class="row"><span>Delivery</span><span id="delivery">₹0</span></div>
<div class="row"><span>Extras</span><span id="extras">₹0</span></div>

<div class="row total">
<span>Total</span>
<span id="finalTotal">₹0</span>
</div>

<button onclick="placeOrder()">Place Order 🚀</button>

</div>
</div>

</div>

<script type="module">
import { db, auth } from './js/firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import {
    collection,
    getDocs,
    query,
    where
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const itemsDiv = document.getElementById("items");

onAuthStateChanged(auth, async (user) => {

    if (!user) return;

    const booksRes = await fetch("data/books.json");
    const books = await booksRes.json();

    const q = query(
        collection(db, "cart"),
        where("userId", "==", user.uid)
    );

    const snapshot = await getDocs(q);

    let total = 0;

    itemsDiv.innerHTML = "";

    snapshot.forEach(docSnap => {
        const data = docSnap.data();

        const book = books.find(b => b.id === data.bookId);
        if (!book) return;

        total += book.price;

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <h3>${book.title}</h3>
            <p>₹${book.price}</p>
        `;

        itemsDiv.appendChild(div);
    });

    document.getElementById("itemsTotal").innerText = "₹" + total;
    document.getElementById("finalTotal").innerText = "₹" + (total + 60);
});

window.placeOrder = function () {
    alert("🎉 Order placed!");
    window.location.href = "index.html";
};
</script>
</body>
</html>
