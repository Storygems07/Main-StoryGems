<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - StoryGems</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f5f7ff;
}

/* HEADER */
.header{
text-align:center;
padding:30px;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.header h1{
color:#4b3ac7;
}

/* LAYOUT */
.container{
display:flex;
flex-wrap:wrap;
gap:30px;
padding:30px;
}

/* LEFT - ITEMS */
.left{
flex:2;
}

.item{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

/* RIGHT - BILL */
.right{
flex:1;
}

.bill{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.bill h3{
margin-bottom:15px;
}

.row{
display:flex;
justify-content:space-between;
margin:10px 0;
color:#555;
}

.total{
font-weight:bold;
font-size:18px;
border-top:1px solid #eee;
padding-top:10px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
background:#6c4ab6;
color:white;
border-radius:10px;
cursor:pointer;
margin-top:15px;
}

</style>
</head>

<body>

<div class="header">
<h1>Checkout 🧾</h1>
</div>

<div class="container">

<!-- ITEMS -->
<div class="left" id="items"></div>

<!-- BILL -->
<div class="right">
<div class="bill">

<h3>Bill Details</h3>

<div class="row"><span>Items Total</span><span id="itemsTotal">₹0</span></div>
<div class="row"><span>Delivery</span><span id="delivery">₹0</span></div>
<div class="row"><span>Extras</span><span id="extras">₹0</span></div>

<div class="row total">
<span>Total</span>
<span id="finalTotal">₹0</span>
</div>

<button onclick="placeOrder()">Place Order 🚀</button>

</div>
</div>

</div>

<script>

const itemsDiv = document.getElementById("items");

// DATA
import { db, auth } from './js/firebase.js';
import {
collection,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

async function loadCheckout(){

const user = auth.currentUser;

const q = query(
collection(db,"cart"),
where("userId","==",user.uid)
);

const snapshot = await getDocs(q);

snapshot.forEach(doc=>{
console.log(doc.data());
});
}

loadCheckout();
const sub = JSON.parse(localStorage.getItem("subscriptionData")) || [];

// DETECT TYPE
let isSubscription = sub.length > 0;

let itemsTotal = 0;
let delivery = 0;
let extras = 0;

// =====================
// 📚 NORMAL BOOKS FLOW
// =====================
if(!isSubscription){

cart.forEach(item => {

const book = books.find(b => b.id === item.id);

if(book){

itemsTotal += book.price;

const div = document.createElement("div");
div.className = "item";

div.innerHTML = `
<h3>${book.title}</h3>
<p>${book.author}</p>
<p>₹${book.price}</p>
`;

itemsDiv.appendChild(div);

}

});

// charges
delivery = 50;
extras = 10;

}

// =====================
// 📦 SUBSCRIPTION FLOW
// =====================
else{

sub.forEach(s => {

itemsTotal += s.price || 0;
delivery += 200;

if(s.type === "blind"){
extras += 49;
}

const div = document.createElement("div");
div.className = "item";

div.innerHTML = `
<h3>Month ${s.month}</h3>
<p>${s.type === "blind" ? "Blind Date 🎁" : s.book}</p>
<p>₹${s.price || 0}</p>
`;

itemsDiv.appendChild(div);

});

}

// TOTAL
const finalTotal = itemsTotal + delivery + extras;

// DISPLAY
document.getElementById("itemsTotal").innerText = "₹" + itemsTotal;
document.getElementById("delivery").innerText = "₹" + delivery;
document.getElementById("extras").innerText = "₹" + extras;
document.getElementById("finalTotal").innerText = "₹" + finalTotal;

// ORDER
function placeOrder(){

alert("🎉 Order Placed Successfully!");

localStorage.removeItem("cart");
localStorage.removeItem("subscriptionData");

window.location.href = "index.html";

}

</script>

</body>
</html>
