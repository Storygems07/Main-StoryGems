<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryGems Books</title>
<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#eef2ff,#fdfbff);
text-align:center;
padding:40px;
}

h1{
color:#5a3ff2;
margin-bottom:20px;
}

.month{
background:white;
padding:20px;
margin:20px auto;
max-width:700px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.options{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:15px;
}

.option{
padding:10px 15px;
border:2px solid #ddd;
border-radius:10px;
cursor:pointer;
}

.option.active{
background:#6c4ab6;
color:white;
border:none;
}

.books{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.book{
padding:8px 12px;
background:#eee;
border-radius:8px;
cursor:pointer;
}

.book.selected{
background:#6c4ab6;
color:white;
}

.total{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

.btn{
margin-top:20px;
padding:12px 25px;
background:linear-gradient(135deg,#6c4ab6,#8f6ed5);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<h1>Select Your Books 📚</h1>

<div id="container"></div>

<p class="total" id="totalPrice">Total: ₹0</p>

<button class="btn" id="continueBtn">Continue</button>

<!-- FOOTER -->
<footer>
<p>© 2026 StoryGems</p>
</footer>

<script type="module" src="js/books.js"></script>

</body>

</html>
