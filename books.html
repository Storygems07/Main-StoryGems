<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryGems Books</title>
<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fdfbff,#eef2ff);
padding:30px;
text-align:center;
}

h1{
color:#5a3ff2;
margin-bottom:20px;
}

.books-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.book-card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:left;
}

.book-card h3{
margin:5px 0;
}

.book-card p{
color:#555;
font-size:14px;
}

.price{
font-weight:bold;
margin-top:10px;
}

button{
margin-top:10px;
width:100%;
padding:10px;
background:#6c4ab6;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#5a3ff2;
}

</style>

</head>

<body>

<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<h1>Explore Books 📚</h1>

<div class="books-container" id="booksContainer"></div>

<script type="module" src="js/books.js"></script>

</body>

</html>
