<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryGems | Choose Age</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#eef2ff,#fdfbff);
}

.container{
text-align:center;
padding:60px 20px;
}

h1{
font-size:32px;
color:#4b3ac7;
}

p{
color:#666;
margin-bottom:40px;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
background:white;
padding:40px;
width:220px;
border-radius:20px;
cursor:pointer;
box-shadow:0 15px 40px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

.icon{
font-size:50px;
}

</style>
</head>

<body>

<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<div class="container">
<h1>Choose Your Reading World 📚</h1>
<p>Select age group to explore perfect books</p>

<div class="cards">

<div class="card" onclick="selectAge('kids')">
<div class="icon">🧸</div>
<h2>Kids</h2>
</div>

<div class="card" onclick="selectAge('teens')">
<div class="icon">📘</div>
<h2>Teens</h2>
</div>

<div class="card" onclick="selectAge('adults')">
<div class="icon">📚</div>
<h2>Adults</h2>
</div>

</div>
</div>

<script>
function selectAge(age){
localStorage.setItem("ageGroup", age);
window.location.href="shop.html";
}
</script>

</body>
</html>
