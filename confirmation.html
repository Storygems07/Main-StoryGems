<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Confirmation - StoryGems</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body.confirm-body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #7b1fa2, #ab47bc);
      color: #fff;
      font-family: 'Arial', sans-serif;
      text-align: center;
      flex-direction: column;
    }
    .confirm-box {
      background: rgba(255,255,255,0.1);
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .confirm-box h1 {
      margin-bottom: 20px;
    }
    .confirm-box p {
      margin-bottom: 30px;
      font-size: 1.2rem;
    }
    .confirm-box button {
      padding: 12px 25px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #fff;
      color: #7b1fa2;
      transition: 0.3s;
    }
    .confirm-box button:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body class="confirm-body">

  <!-- Navbar dynamically loaded -->
  <div id="navbar"></div>
  <script type="module" src="js/includeNavbar.js"></script>

  <!-- Confirmation Box -->
  <div class="confirm-box">
    <h1 id="welcomeMsg">Hi, User!</h1>
    <p>You have successfully logged in.</p>
    <button onclick="goHome()">Go to StoryGems</button>
  </div>

  <script type="module">
    // Load current user from localStorage
    const user = JSON.parse(localStorage.getItem('currentUser'));
    const welcome = document.getElementById('welcomeMsg');

    if(user){
      welcome.textContent = `Hi, ${user.name}!`;
    } else {
      // If no user, redirect to login
      window.location.href = 'login.html';
    }

    function goHome() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
