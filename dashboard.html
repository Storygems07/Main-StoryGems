<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - StoryGems</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#f5f7ff;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:white;
position:fixed;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.sidebar h2{
color:#6c4ab6;
}

.nav a{
display:block;
margin:15px 0;
text-decoration:none;
color:#333;
font-weight:500;
}

.nav a:hover{
color:#6c4ab6;
}

/* MAIN */
.main{
margin-left:240px;
padding:30px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.card h3{
margin:0;
color:#6c4ab6;
}

.section{
margin-top:40px;
}

.order{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="sidebar">
<h2>StoryGems</h2>

<div class="nav">
<a href="dashboard.html">🏠 Home</a>
<a href="orders.html">📦 My Orders</a>
<a href="cart.html">🛒 Cart</a>
<a href="profile.html">👤 Profile</a>
</div>
</div>

<div class="main">

<h1 id="welcome">Welcome 👋</h1>

<div class="cards">
<div class="card">
<h3 id="ordersCount">0</h3>
<p>Total Orders</p>
</div>

<div class="card">
<h3 id="booksCount">0</h3>
<p>Books Purchased</p>
</div>

<div class="card">
<h3 id="activeOrders">0</h3>
<p>Active Orders</p>
</div>
</div>

<div class="section">
<h2>Recent Orders</h2>
<div id="ordersList"></div>
</div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
