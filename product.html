<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Details | StoryGems</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f5f6fa;
}

/* LAYOUT */
.container{
display:flex;
flex-wrap:wrap;
gap:40px;
padding:40px;
}

/* LEFT IMAGE */
.left{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.book-img{
width:250px;
height:350px;
border-radius:15px;
background:#eee;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
}

/* RIGHT DETAILS */
.right{
flex:2;
}

.title{
font-size:28px;
font-weight:600;
}

.author{
color:#777;
margin:5px 0;
}

.rating{
color:#f5a623;
margin:10px 0;
}

.price{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

/* DESC */
.desc{
margin:15px 0;
color:#555;
line-height:1.6;
}

/* BUTTON */
button{
padding:12px 20px;
border:none;
background:#6c4ab6;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<div class="container">

<div class="left">
<div class="book-img" id="bookImg"></div>
</div>

<div class="right">
<div class="title" id="title"></div>
<div class="author" id="author"></div>
<div class="rating" id="rating"></div>
<div class="price" id="price"></div>

<div class="desc" id="desc"></div>

<button onclick="addToCart()">Add to Cart 🛒</button>
</div>

</div>

<script src="js/product.js"></script>

</body>
</html>
