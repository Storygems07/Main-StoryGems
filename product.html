<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Details | StoryGems</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

.container{
display:flex;
flex-wrap:wrap;
gap:40px;
padding:40px;
}

.book-img img{
width:250px;
height:350px;
object-fit:cover;
border-radius:15px;
}

.right{
flex:2;
}

.title{
font-size:28px;
font-weight:600;
}

.price{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

button{
padding:12px 20px;
background:#6366f1;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.back-btn{
display:block;
margin:20px auto;
padding:12px 25px;
background:#444;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<div class="container">

<div class="book-img" id="bookImg"></div>

<div class="right">
<div class="title" id="title"></div>
<div id="author"></div>
<div id="rating"></div>
<div class="price" id="price"></div>
<div id="desc"></div>

<button onclick="addToCart()">Add to Cart 🛒</button>
</div>

</div>

<button class="back-btn" onclick="window.location.href='shop.html'">
← Back to Shop
</button>

<script src="js/product.js"></script>

</body>
</html>
