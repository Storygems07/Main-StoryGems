<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StoryGems Subscription</title>

  <link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* BASE */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#eef2ff,#fdfbff);
padding-top:80px;
}

/* PROGRESS BAR */
.progress-container{
width:100%;
height:6px;
background:#ddd;
position:fixed;
top:70px;
left:0;
z-index:1000;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(135deg,#6c4ab6,#8b6cff);
transition:0.4s;
}

/* HEADER */
.header{
text-align:center;
padding:30px 20px;
}

.header h1{
font-size:34px;
color:#5a3ff2;
}

.header p{
color:#666;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* MONTH CARD */
.month{
background:white;
padding:25px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
transition:0.3s;
}

.month:hover{
transform:translateY(-5px);
}

.month.completed{
border:2px solid #6c4ab6;
box-shadow:0 0 20px rgba(108,74,182,0.3);
}

/* OPTIONS */
.options{
display:flex;
gap:15px;
margin-bottom:15px;
}

.option{
flex:1;
padding:12px;
border-radius:12px;
border:2px solid #ddd;
text-align:center;
cursor:pointer;
transition:0.3s;
font-weight:500;
}

.option.active{
background:linear-gradient(135deg,#6c4ab6,#8b6cff);
color:white;
border:none;
}

/* BOOK GRID */
.books{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
}

/* BOOK CARD */
.book{
background:#f4f5ff;
border-radius:12px;
padding:10px;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.book:hover{
transform:scale(1.07);
}

.book.selected{
background:linear-gradient(135deg,#6c4ab6,#8b6cff);
color:white;
transform:scale(1.1);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.book img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
margin-bottom:5px;
}

.book p{
margin:3px 0;
font-size:14px;
}

/* STICKY BAR */
.sticky-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}

.sticky-bar span{
font-size:18px;
font-weight:600;
}

.sticky-bar button{
padding:12px 25px;
border:none;
background:linear-gradient(135deg,#6c4ab6,#8b6cff);
color:white;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<!-- PROGRESS -->
<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<!-- HEADER -->
<div class="header">
<h1>Customize Your Subscription ✨</h1>
<p>Choose your books or enjoy blind date surprises 🎁</p>
</div>

<!-- CONTENT -->
<div class="container" id="container"></div>

<!-- STICKY TOTAL -->
<div class="sticky-bar">
<span id="totalPrice">Total: ₹0</span>
<button onclick="continueCheckout()">Continue →</button>
</div>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

// PLAN
const plan = parseInt(localStorage.getItem("plan")) || 2;

// BOOK DATA
const books = [
{ title:"Atomic Habits", price:300, img:"https://covers.openlibrary.org/b/id/10523338-L.jpg" },
{ title:"Ikigai", price:250, img:"https://covers.openlibrary.org/b/id/9259251-L.jpg" },
{ title:"Rich Dad Poor Dad", price:350, img:"https://covers.openlibrary.org/b/id/8228691-L.jpg" },
{ title:"The Alchemist", price:280, img:"https://covers.openlibrary.org/b/id/8108691-L.jpg" }
];

const container = document.getElementById("container");

let selections = [];

// CREATE MONTHS
for(let i=1;i<=plan;i++){

const div=document.createElement("div");
div.className="month";

div.innerHTML=`
<h3>Month ${i}</h3>

<div class="options">
<div class="option" data-type="own">Choose Book</div>
<div class="option" data-type="blind">Blind Date 🎁 (+₹49)</div>
</div>

<div class="books">
${books.map(b=>`
<div class="book" data-price="${b.price}">
<img src="${b.img}">
<p>${b.title}</p>
<p>₹${b.price}</p>
</div>
`).join("")}
</div>
`;

container.appendChild(div);
}

// EVENTS
document.querySelectorAll(".month").forEach((monthDiv,index)=>{

const options=monthDiv.querySelectorAll(".option");
const bookEls=monthDiv.querySelectorAll(".book");

let type=null;
let price=0;
let bookName=null;

options.forEach(opt=>{
opt.onclick=()=>{

options.forEach(o=>o.classList.remove("active"));
opt.classList.add("active");

type=opt.dataset.type;

if(type==="blind"){
monthDiv.querySelector(".books").style.display="none";
price=300;
bookName="Blind Surprise 🎁";
}else{
monthDiv.querySelector(".books").style.display="grid";
}

update();
};
});

bookEls.forEach(b=>{
b.onclick=()=>{

bookEls.forEach(x=>x.classList.remove("selected"));
b.classList.add("selected");

// click animation
b.style.transform="scale(1.15)";
setTimeout(()=>{b.style.transform=""},200);

bookName=b.querySelector("p").innerText;
price=parseInt(b.dataset.price);

update();
};
});

function update(){

selections[index]={
month:index+1,
type,
book:bookName,
price
};

if(type){
monthDiv.classList.add("completed");
}

calculate();
updateProgress();

}

});

// PRICE
function calculate(){

let total=0;

selections.forEach(s=>{
if(!s) return;

total+=s.price || 0;
total+=200;

if(s.type==="blind"){
total+=49;
}
});

document.getElementById("totalPrice").innerText="Total: ₹"+total;
}

// PROGRESS
function updateProgress(){

let completed = selections.filter(s => s && s.type).length;

let percent = (completed / plan) * 100;

document.getElementById("progressBar").style.width = percent + "%";
}

// CONTINUE
function continueCheckout(){

if(selections.length!==plan){
alert("Complete all months");
return;
}

for(let s of selections){
if(!s || !s.type){
alert("Select option for all months");
return;
}
if(s.type==="own" && !s.book){
alert("Select book for each month");
return;
}
}

// CONFETTI 🎉
confetti({
particleCount:120,
spread:70,
origin:{y:0.6}
});

setTimeout(()=>{
localStorage.setItem("subscriptionData", JSON.stringify(selections));
window.location.href="checkout.html";
},1200);

}

</script>

</body>
</html>
