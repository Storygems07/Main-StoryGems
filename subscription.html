<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StoryGems Subscription</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#eef2ff,#fdfbff);
}

/* HEADER */
.header{
text-align:center;
padding:40px 20px;
}

.header h1{
color:#4b3ac7;
}

.header p{
color:#666;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* MONTH CARD */
.month{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* OPTIONS */
.options{
display:flex;
gap:10px;
margin:15px 0;
}

.option{
flex:1;
padding:10px;
border-radius:10px;
border:2px solid #ddd;
text-align:center;
cursor:pointer;
}

.option.active{
background:#6c4ab6;
color:white;
border:none;
}

/* BOOK LIST */
.books{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.book{
padding:8px 12px;
background:#eee;
border-radius:8px;
cursor:pointer;
}

.book.selected{
background:#6c4ab6;
color:white;
}

/* TOTAL */
.total{
text-align:center;
font-size:20px;
margin-top:20px;
font-weight:bold;
}

/* BUTTON */
.btn{
display:block;
margin:20px auto;
padding:12px 30px;
background:#6c4ab6;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<h1>Customize Your Subscription ✨</h1>
<p>Select books or try blind date for each month</p>
</div>

<div class="container" id="container"></div>

<p class="total" id="totalPrice">Total: ₹0</p>

<button class="btn" onclick="continueCheckout()">Continue</button>

<script>

// PLAN
const plan = parseInt(localStorage.getItem("plan")) || 2;

// SAMPLE BOOKS (you can later filter by category)
const books = [
{ title:"Atomic Habits", price:300 },
{ title:"Ikigai", price:250 },
{ title:"Rich Dad Poor Dad", price:350 },
{ title:"The Alchemist", price:280 }
];

const container = document.getElementById("container");

let selections = [];

// CREATE MONTHS
for(let i=1;i<=plan;i++){

const div=document.createElement("div");
div.className="month";

div.innerHTML=`
<h3>Month ${i}</h3>

<div class="options">
<div class="option" data-type="own">Choose Book</div>
<div class="option" data-type="blind">Blind Date 🎁</div>
</div>

<div class="books">
${books.map(b=>`<div class="book" data-price="${b.price}">${b.title}</div>`).join("")}
</div>
`;

container.appendChild(div);

}

// EVENTS
document.querySelectorAll(".month").forEach((monthDiv,index)=>{

const options=monthDiv.querySelectorAll(".option");
const bookEls=monthDiv.querySelectorAll(".book");

let type=null;
let price=0;
let bookName=null;

options.forEach(opt=>{
opt.onclick=()=>{

options.forEach(o=>o.classList.remove("active"));
opt.classList.add("active");

type=opt.dataset.type;

if(type==="blind"){
monthDiv.querySelector(".books").style.display="none";
price=300; // avg
bookName="Blind";
}else{
monthDiv.querySelector(".books").style.display="flex";
}

update();
};
});

bookEls.forEach(b=>{
b.onclick=()=>{

bookEls.forEach(x=>x.classList.remove("selected"));
b.classList.add("selected");

bookName=b.innerText;
price=parseInt(b.dataset.price);

update();
};
});

function update(){

selections[index]={
month:index+1,
type,
book:bookName,
price
};

calculate();
}

});

// PRICE CALC
function calculate(){

let total=0;

selections.forEach(s=>{
if(!s) return;

total+=s.price || 0;
total+=200; // packaging

if(s.type==="blind"){
total+=49;
}
});

document.getElementById("totalPrice").innerText="Total: ₹"+total;
}

// CONTINUE
function continueCheckout(){

if(selections.length!==plan){
alert("Complete all months");
return;
}

for(let s of selections){
if(!s || !s.type){
alert("Select option for all months");
return;
}
if(s.type==="own" && !s.book){
alert("Select book for each month");
return;
}
}

localStorage.setItem("subscriptionData", JSON.stringify(selections));

window.location.href="checkout.html";

}

</script>

</body>
</html>
