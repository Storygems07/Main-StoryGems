<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StoryGems Subscription</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#eef2ff,#fdfbff);
}

/* NAV SPACE FIX */
body{
padding-top:80px;
}

/* HEADER */
.header{
text-align:center;
padding:30px 20px;
}

.header h1{
font-size:34px;
color:#5a3ff2;
margin-bottom:10px;
}

.header p{
color:#666;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* MONTH CARD */
.month{
background:white;
padding:25px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
transition:0.3s;
}

.month:hover{
transform:translateY(-5px);
}

/* TITLE */
.month h3{
margin-bottom:15px;
color:#333;
}

/* OPTIONS */
.options{
display:flex;
gap:15px;
margin-bottom:15px;
}

.option{
flex:1;
padding:12px;
border-radius:12px;
border:2px solid #ddd;
text-align:center;
cursor:pointer;
transition:0.3s;
font-weight:500;
}

.option:hover{
transform:scale(1.03);
}

.option.active{
background:linear-gradient(135deg,#6c4ab6,#8b6cff);
color:white;
border:none;
}

/* BOOK GRID */
.books{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
margin-top:10px;
}

/* BOOK CARD */
.book{
background:#f4f5ff;
border-radius:12px;
padding:10px;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.book:hover{
transform:scale(1.07);
}

.book.selected{
background:linear-gradient(135deg,#6c4ab6,#8b6cff);
color:white;
}

/* IMAGE */
.book img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
margin-bottom:5px;
}

/* PRICE */
.book p{
margin:3px 0;
font-size:14px;
}

/* TOTAL */
.total{
text-align:center;
font-size:22px;
font-weight:600;
margin-top:25px;
color:#333;
}

/* BUTTON */
.btn{
display:block;
margin:30px auto;
padding:14px 35px;
background:linear-gradient(135deg,#6c4ab6,#8b6cff);
color:white;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* STICKY TOTAL BAR */
.sticky-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}

.sticky-bar button{
padding:10px 20px;
border:none;
background:#6c4ab6;
color:white;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- NAVBAR AUTO -->
<script type="module" src="js/includeNavbar.js"></script>

<div class="header">
<h1>Customize Your Subscription ✨</h1>
<p>Choose your books or enjoy surprise blind dates 🎁</p>
</div>

<div class="container" id="container"></div>

<div class="sticky-bar">
<span id="totalPrice">Total: ₹0</span>
<button onclick="continueCheckout()">Continue →</button>
</div>

<script>

// PLAN
const plan = parseInt(localStorage.getItem("plan")) || 2;

// BOOKS WITH IMAGES
const books = [
{ title:"Atomic Habits", price:300, img:"https://covers.openlibrary.org/b/id/10523338-L.jpg" },
{ title:"Ikigai", price:250, img:"https://covers.openlibrary.org/b/id/9259251-L.jpg" },
{ title:"Rich Dad Poor Dad", price:350, img:"https://covers.openlibrary.org/b/id/8228691-L.jpg" },
{ title:"The Alchemist", price:280, img:"https://covers.openlibrary.org/b/id/8108691-L.jpg" }
];

const container = document.getElementById("container");

let selections = [];

// CREATE MONTHS
for(let i=1;i<=plan;i++){

const div=document.createElement("div");
div.className="month";

div.innerHTML=`
<h3>Month ${i}</h3>

<div class="options">
<div class="option" data-type="own">Choose Book</div>
<div class="option" data-type="blind">Blind Date 🎁 (+₹49)</div>
</div>

<div class="books">
${books.map(b=>`
<div class="book" data-price="${b.price}">
<img src="${b.img}">
<p>${b.title}</p>
<p>₹${b.price}</p>
</div>
`).join("")}
</div>
`;

container.appendChild(div);
}

// EVENTS
document.querySelectorAll(".month").forEach((monthDiv,index)=>{

const options=monthDiv.querySelectorAll(".option");
const bookEls=monthDiv.querySelectorAll(".book");

let type=null;
let price=0;
let bookName=null;

options.forEach(opt=>{
opt.onclick=()=>{

options.forEach(o=>o.classList.remove("active"));
opt.classList.add("active");

type=opt.dataset.type;

if(type==="blind"){
monthDiv.querySelector(".books").style.display="none";
price=300;
bookName="Blind Surprise 🎁";
}else{
monthDiv.querySelector(".books").style.display="grid";
}

update();
};
});

bookEls.forEach(b=>{
b.onclick=()=>{

bookEls.forEach(x=>x.classList.remove("selected"));
b.classList.add("selected");

bookName=b.querySelector("p").innerText;
price=parseInt(b.dataset.price);

update();
};
});

function update(){

selections[index]={
month:index+1,
type,
book:bookName,
price
};

calculate();
}

});

// PRICE
function calculate(){

let total=0;

selections.forEach(s=>{
if(!s) return;

total+=s.price || 0;
total+=200;

if(s.type==="blind"){
total+=49;
}
});

document.getElementById("totalPrice").innerText="Total: ₹"+total;
}

// CONTINUE
function continueCheckout(){

if(selections.length!==plan){
alert("Complete all months");
return;
}

for(let s of selections){
if(!s || !s.type){
alert("Select option for all months");
return;
}
if(s.type==="own" && !s.book){
alert("Select book for each month");
return;
}
}

localStorage.setItem("subscriptionData", JSON.stringify(selections));

window.location.href="checkout.html";
}

</script>

</body>
</html>
