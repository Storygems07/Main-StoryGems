<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryGems | Categories</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
background:linear-gradient(135deg,#fdfbff,#eef2ff);
}

.container{
text-align:center;
padding:40px 20px;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
background:white;
padding:30px;
width:220px;
border-radius:18px;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px) scale(1.05);
background:#6c4ab6;
color:white;
}

.nav-btn{
margin-top:40px;
padding:14px 28px;
background:#6366f1;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<div class="container">

<h1>Select Category ✨</h1>
<p id="subtitle"></p>

<div id="categories" class="grid"></div>

<button class="nav-btn" onclick="goHome()">← Back to Home</button>

</div>

<script>

const age = localStorage.getItem("ageGroup");

if(!age){
window.location.href = "books.html";
}

document.getElementById("subtitle").innerText =
"Showing categories for " + age.toUpperCase();

const data = {
kids:[
{name:"Mythology", icon:"🕉️"},
{name:"Moral Stories", icon:"🌟"}
],
teens:[
{name:"Fantasy", icon:"🧙"},
{name:"Adventure", icon:"🏕️"}
],
adults:[
{name:"Self Help", icon:"💡"},
{name:"Classics", icon:"📖"}
]
};

const container = document.getElementById("categories");

data[age].forEach(cat=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`<h3>${cat.name}</h3>`;
div.onclick=()=>{
localStorage.setItem("category",cat.name);
window.location.href="shop.html";
};
container.appendChild(div);
});

function goHome(){
window.location.href="index.html";
}

</script>

</body>
</html>
