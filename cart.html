<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Cart - StoryGems</title>
<link rel="stylesheet" href="css/style.css">

<style>
body{
font-family:'Poppins',sans-serif;
background:#fdfbff;
padding:30px;
}

h2{
text-align:center;
}

.cart-container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #eee;
}

.total{
text-align:right;
margin-top:15px;
font-weight:bold;
}

button{
margin-top:10px;
padding:10px;
background:#6c4ab6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.remove-btn{
background:red;
}

</style>

</head>

<body>

<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<h2>My Cart 🛒</h2>

<div class="cart-container">
  <div id="cartItems"></div>
  <p class="total" id="totalPrice"></p>

  <button onclick="checkout()">Checkout</button>
</div>

<script type="module" src="js/cart.js"></script>

</body>
</html>
