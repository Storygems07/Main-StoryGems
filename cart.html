<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Cart - StoryGems</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="navbar"></div>
<script type="module" src="js/includeNavbar.js"></script>

<h2 style="text-align:center;margin-top:30px;">My Cart</h2>

<div id="cartContainer" class="category-cards"></div>

<h3 id="totalPrice" style="text-align:center;"></h3>

<button onclick="checkout()" style="display:block;margin:auto;">Checkout</button>

<script type="module">

import { auth, onAuthStateChanged } from './firebase.js';

onAuthStateChanged(auth,user=>{
if(!user) window.location.href="login.html";
});


function loadCart(){

const cart = JSON.parse(localStorage.getItem('cart')) || [];
const books = JSON.parse(localStorage.getItem('booksData')) || [];

const container = document.getElementById('cartContainer');
const totalText = document.getElementById('totalPrice');

container.innerHTML="";

let total=0;

cart.forEach((id,index)=>{

const book = books.find(b=>b.id===id);

if(book){

total+=Number(book.price);

const div=document.createElement('div');

div.className="category-card";

div.innerHTML=`
<h3>${book.title}</h3>
<p>${book.author}</p>
<p>₹${book.price}</p>
<button onclick="removeItem(${index})">Remove</button>
`;

container.appendChild(div);

}

});

totalText.innerText="Total: ₹"+total;

}

function removeItem(index){

let cart = JSON.parse(localStorage.getItem('cart')) || [];

cart.splice(index,1);

localStorage.setItem('cart', JSON.stringify(cart));

loadCart();

}

function checkout(){

window.location.href="checkout.html";

}

window.removeItem=removeItem;
window.checkout=checkout;

loadCart();

</script>

</body>
</html>
