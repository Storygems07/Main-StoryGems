<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Orders | StoryGems</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:#f5f7ff;
}

.header{
background:white;
padding:25px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.header h1{
color:#6c4ab6;
}

.container{
max-width:900px;
margin:30px auto;
padding:20px;
}

.order{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,.05);
}

.order h3{
margin:0;
color:#6c4ab6;
}

.book{
padding:10px;
margin-top:10px;
background:#f8f8ff;
border-radius:10px;
}

.status{
display:inline-block;
margin-top:15px;
padding:8px 15px;
background:#6c4ab6;
color:white;
border-radius:20px;
font-size:14px;
}

.empty{
text-align:center;
font-size:20px;
margin-top:80px;
color:#777;
}

</style>

</head>

<body>

<div class="header">
<h1>📦 My Orders</h1>
</div>

<div class="container" id="ordersContainer">

<div class="empty">
Loading orders...
</div>

</div>

<script type="module" src="js/orders.js"></script>

</body>
</html>
