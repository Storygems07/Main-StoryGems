<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryGems</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <div id="navbar"></div>
  <script type="module" src="js/includeNavbar.js"></script>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Welcome to StoryGems</h1>
      <p>Your portal to magical stories for all ages</p>
      <div class="hero-buttons">
        <a href="books.html" class="btn">Explore Books</a>
        <a href="plans.html" class="btn btn-secondary">See Plans</a>
      </div>
    </div>
  </section>

  <!-- Plans Section -->
  <section class="plans">
    <h2>Our Plans</h2>
    <div class="plan-cards">
      <div class="card">
        <h3>1 Month Plan</h3>
        <p>Access all books for 1 month</p>
      </div>
      <div class="card">
        <h3>3 Month Plan</h3>
        <p>Access all books for 3 months</p>
      </div>
      <div class="card">
        <h3>6 Month Plan</h3>
        <p>Access all books for 6 months</p>
      </div>
    </div>
  </section>

  <!-- Categories Section -->
  <section class="categories">
    <h2>Categories</h2>
    <div class="category-cards">
      <div class="category-card" onclick="window.location.href='kids.html'">Kids</div>
      <div class="category-card" onclick="window.location.href='teens.html'">Teens</div>
      <div class="category-card" onclick="window.location.href='adults.html'">Adults</div>
    </div>
  </section>

</body>
</html>
