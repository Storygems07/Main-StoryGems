<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryGems - Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="js/includeNavbar.js" defer></script>
    <script defer>
        // Scroll Reveal Animation
        document.addEventListener('DOMContentLoaded', () => {
            const scrollElements = document.querySelectorAll('.scroll-reveal');

            const elementInView = (el, offset = 100) => {
                const elementTop = el.getBoundingClientRect().top;
                return elementTop <= (window.innerHeight - offset);
            };

            const displayScrollElement = (element) => {
                element.classList.add('show');
            };

            const hideScrollElement = (element) => {
                element.classList.remove('show');
            };

            const handleScrollAnimation = () => {
                scrollElements.forEach(el => {
                    if(elementInView(el, 150)) {
                        displayScrollElement(el);
                    } else {
                        hideScrollElement(el);
                    }
                });
            };

            window.addEventListener('scroll', () => { handleScrollAnimation(); });
            handleScrollAnimation(); // run on load
        });
    </script>
</head>
<body>

    <!-- NAVBAR -->
    <div id="navbar"></div>

    <!-- HERO SECTION -->
    <section class="hero scroll-reveal">
        <div class="particles"></div> <!-- Magical floating particles -->
        <h1 class="hero-title">Welcome to StoryGems</h1>
        <p class="hero-subtitle">Discover your next favorite book, explore magical worlds, and unlock your imagination.</p>
        <div class="hero-buttons">
            <a href="books.html" class="btn">Explore Books</a>
            <a href="plans.html" class="btn btn-secondary">View Plans</a>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="scroll-reveal">
        <p>&copy; 2026 StoryGems. All rights reserved.</p>
        <div class="socials">
            <a href="https://www.instagram.com/story_gems_official/" target="_blank">
                
                <i class="fab fa-instagram"></i> Instagram
            </a> |
            <a href="#"><i class="fab fa-facebook"></i> Facebook</a> |
            <a href="#"><i class="fab fa-twitter"></i> Twitter</a>
        </div>
    </footer>

</body>
</html>
